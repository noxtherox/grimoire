  <line class="spoke" x1="48" y1="48" x2="48" y2="21" stroke-width="2.5"></line>
  <line class="spoke" x1="48" y1="48" x2="25" y2="61" stroke-width="2.5"></line>
  <line class="spoke" x1="48" y1="48" x2="71" y2="61" stroke-width="2.5"></line>
  <line class="edge" x1="48" y1="21" x2="25" y2="61" stroke-width="2"></line>
