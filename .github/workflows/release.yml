name: Release desktop app

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        run: |
          APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          test "v${APP_VERSION}" = "${GITHUB_REF_NAME}"

      - name: Test
        run: pnpm exec vitest run --exclude '.claude/**'

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: Grimoire v__VERSION__ for Apple Silicon
          releaseBody: |
            Download the DMG to install Grimoire on an Apple Silicon Mac.

            Installed copies check for signed updates automatically.
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
